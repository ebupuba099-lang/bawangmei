name: 霸王梅 · 开奖数据更新

on:
  schedule:
    # 北京时间 21:40 = UTC 13:40
    - cron: '40 13 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  update-lottery:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 获取开奖数据
        run: python scripts/fetch_lottery.py

      - name: 提交变更
        run: |
          git config user.name "霸王梅 Bot"
          git config user.email "bawangmei-bot@users.noreply.github.com"
          git add public/data/lottery_data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "chore: 自动更新排列5开奖数据 ($(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M'))"
            git push
          fi